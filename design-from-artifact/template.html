:root {
  /* -----------------------------------------------------
     COLORS — Logo anchors (accent / pop only)
     ----------------------------------------------------- */
  --ma-black:        #000000;   /* logo base, hero bg, dark CTAs */
  --ma-gold:         #e8c020;   /* primary accent, CTA, stat highlights */
  --ma-forest:       #184010;   /* secondary accent, supporting */

  /* COLORS — Extended palette (everyday surfaces) */
  --ma-white:        #ffffff;   /* primary bg, cards, clean sections */
  --ma-off-white:    #f7f5f0;   /* page bg, section alternates */
  --ma-sage:         #e8f0e4;   /* green-tinted callouts */
  --ma-light-gold:   #faf4d3;   /* gold-tinted stat cards */
  --ma-charcoal:     #3a3a3a;   /* body text — softer than pure black */
  --ma-mid-gray:     #8a8a8a;   /* captions, secondary, labels */

  /* Hairline borders / dividers (derived) */
  --ma-line:         #e5e2da;   /* on off-white */
  --ma-line-strong:  #c9c5b8;
  --ma-line-dark:    #1a1a1a;   /* on black */

  /* -----------------------------------------------------
     SEMANTIC — Foreground
     ----------------------------------------------------- */
  --fg-1:   var(--ma-black);     /* high-impact headlines on light */
  --fg-2:   var(--ma-charcoal);  /* default body on light */
  --fg-3:   var(--ma-mid-gray);  /* captions, labels */
  --fg-inv: var(--ma-white);     /* on dark surfaces */
  --fg-brand-green: var(--ma-forest);
  --fg-brand-gold:  var(--ma-gold);

  /* SEMANTIC — Background */
  --bg-page:     var(--ma-off-white);
  --bg-surface:  var(--ma-white);
  --bg-hero:     var(--ma-black);
  --bg-sage:     var(--ma-sage);
  --bg-gold:     var(--ma-light-gold);

  /* SEMANTIC — Accents */
  --accent-primary:   var(--ma-gold);    /* CTA / highlights */
  --accent-secondary: var(--ma-forest);  /* supporting */

  /* -----------------------------------------------------
     TYPE — Families
     ----------------------------------------------------- */
  /* Display leans Archivo (500-700), not Archivo Black. Reserve 900 for rare hero moments. */
  --font-display: 'Archivo', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --font-sans:    'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --font-mono:    'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

  /* TYPE — Weight */
  --fw-regular:  400;
  --fw-medium:   500;
  --fw-semibold: 600;
  --fw-bold:     700;
  --fw-black:    900;

  /* TYPE — Scale (px / rem) */
  --fs-caption: 0.75rem;   /* 12 */
  --fs-label:   0.8125rem; /* 13 */
  --fs-small:   0.875rem;  /* 14 */
  --fs-body:    1rem;      /* 16 */
  --fs-lead:    1.125rem;  /* 18 */
  --fs-h6:      1.125rem;  /* 18 */
  --fs-h5:      1.375rem;  /* 22 */
  --fs-h4:      1.5rem;    /* 24 */
  --fs-h3:      1.875rem;  /* 30 */
  --fs-h2:      2.375rem;  /* 38 */
  --fs-h1:      3rem;      /* 48 */
  --fs-display: 3.75rem;   /* 60 — hero headlines, use sparingly */

  /* TYPE — Leading */
  --lh-tight:   1.05;
  --lh-snug:    1.2;
  --lh-normal:  1.45;
  --lh-body:    1.6;
  --lh-loose:   1.75;

  /* TYPE — Tracking (letter-spacing) */
  --ls-tightest: -0.04em;
  --ls-tight:    -0.02em;
  --ls-normal:    0;
  --ls-wide:      0.04em;
  --ls-eyebrow:   0.14em;   /* for ALL-CAPS eyebrows */

  /* -----------------------------------------------------
     SPACING (8pt-ish with 4px minor step)
     ----------------------------------------------------- */
  --sp-0:  0;
  --sp-1:  4px;
  --sp-2:  8px;
  --sp-3:  12px;
  --sp-4:  16px;
  --sp-5:  24px;
  --sp-6:  32px;
  --sp-7:  48px;
  --sp-8:  64px;
  --sp-9:  96px;
  --sp-10: 128px;

  /* RADIUS — keep it restrained. Architectural, not bubbly. */
  --r-none: 0;
  --r-xs:   2px;
  --r-sm:   4px;
  --r-md:   8px;
  --r-lg:   12px;
  --r-pill: 999px;

  /* ELEVATION — subtle. Light layouts lean on lines, not shadows. */
  --shadow-1: 0 1px 2px rgba(16, 16, 16, 0.04), 0 1px 1px rgba(16, 16, 16, 0.03);
  --shadow-2: 0 2px 8px rgba(16, 16, 16, 0.06), 0 1px 2px rgba(16, 16, 16, 0.04);
  --shadow-3: 0 12px 32px rgba(16, 16, 16, 0.09), 0 2px 6px rgba(16, 16, 16, 0.04);
  --shadow-hero: 0 24px 64px rgba(0, 0, 0, 0.18);

  /* MOTION — reserved, not springy */
  --ease-standard: cubic-bezier(0.2, 0.8, 0.2, 1);
  --ease-out:      cubic-bezier(0.16, 1, 0.3, 1);
  --dur-fast:      120ms;
  --dur-base:      200ms;
  --dur-slow:      360ms;

  /* LAYOUT */
  --container:     1200px;
  --container-lg:  1360px;
  --gutter:        clamp(16px, 3vw, 32px);
}

/* =========================================================
   BASE RESETS + ELEMENT STYLES
   ========================================================= */

html {
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

body {
  margin: 0;
  font-family: var(--font-sans);
  font-size: var(--fs-body);
  line-height: var(--lh-body);
  color: var(--fg-2);
  background: var(--bg-page);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* Headlines — display face, tight */
h1, h2, h3, h4, h5, h6 {
  font-family: var(--font-display);
  color: var(--fg-1);
  font-weight: var(--fw-semibold);   /* default 600 — calm, professional */
  letter-spacing: var(--ls-tight);
  line-height: var(--lh-snug);
  margin: 0 0 var(--sp-4) 0;
  text-wrap: balance;
  text-transform: none;              /* sentence case by default */
}
h1 { font-weight: var(--fw-bold); }  /* 700 for H1 only */

h1 { font-size: var(--fs-h1); letter-spacing: var(--ls-tightest); }
h2 { font-size: var(--fs-h2); letter-spacing: var(--ls-tightest); }
h3 { font-size: var(--fs-h3); }
h4 { font-size: var(--fs-h4); }
h5 { font-size: var(--fs-h5); }
h6 { font-size: var(--fs-h6); line-height: var(--lh-snug); }

/* Display headline helper — reserve for hero moments */
.display {
  font-family: var(--font-display);
  font-size: var(--fs-display);
  line-height: 0.98;
  letter-spacing: -0.045em;
  text-transform: uppercase;
  font-weight: var(--fw-black);
  color: var(--fg-1);
  text-wrap: balance;
}

/* Eyebrow — all-caps preamble above a headline */
.eyebrow {
  font-family: var(--font-sans);
  font-size: var(--fs-caption);
  font-weight: var(--fw-semibold);
  letter-spacing: var(--ls-eyebrow);
  text-transform: uppercase;
  color: var(--fg-3);
  margin: 0 0 var(--sp-3) 0;
}

.eyebrow--green { color: var(--ma-forest); }
.eyebrow--gold  { color: var(--ma-gold); }

/* Body */
p {
  margin: 0 0 var(--sp-4) 0;
  font-size: var(--fs-body);
  line-height: var(--lh-body);
  color: var(--fg-2);
  text-wrap: pretty;
}
.lead { font-size: var(--fs-lead); line-height: var(--lh-normal); color: var(--fg-2); }
small, .caption {
  font-size: var(--fs-caption);
  color: var(--fg-3);
  letter-spacing: var(--ls-wide);
}

/* Mono — rare, for data / stats */
code, kbd, pre, .mono {
  font-family: var(--font-mono);
  font-size: 0.9em;
}

/* Links */
a {
  color: inherit;
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 3px;
  text-decoration-color: var(--ma-gold);
  transition: color var(--dur-fast) var(--ease-standard);
}
a:hover { color: var(--ma-forest); }

/* HR */
hr {
  border: 0;
  border-top: 1px solid var(--ma-line);
  margin: var(--sp-7) 0;
}

/* Selection */
::selection {
  background: var(--ma-gold);
  color: var(--ma-black);
}

/* Big number / stat — signature MA pattern. Kept restrained. */
.stat {
  font-family: var(--font-display);
  font-size: clamp(2.25rem, 4vw, 3.5rem);
  line-height: 1;
  letter-spacing: -0.025em;
  color: var(--ma-black);
  font-weight: var(--fw-bold);       /* 700, not 900 */
}
.stat--gold  { color: var(--ma-gold); }
.stat--green { color: var(--ma-forest); }

/* Utility: container */
.container {
  max-width: var(--container);
  margin: 0 auto;
  padding-inline: var(--gutter);
}

  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
}
/* latin */
@font-face {
  font-family: 'JetBrains Mono';
  font-style: normal;
  font-weight: 500;
  font-display: swap;
  src: url("71a132ea-9748-4894-a0aa-4a15ac967ab5") format('woff2');
  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
}


:root {
  /* Operational type — the marketing system uses Archivo/DM Sans;
     the dashboard chrome uses Inter for tabular density.
     Display + brand bits still use Archivo. */
  --font-ui: 'Inter', system-ui, -apple-system, 'Helvetica Neue', sans-serif;

  /* Per-tenant accent — overridden by .theme-mckenzie / .theme-aoc / inline style */
  --accent:        #0F766E;       /* default: McKenzie deep teal */
  --accent-ink:    #ffffff;
  --accent-tint:   #E6F4F2;       /* pale wash for hovers / chips */
  --accent-tint-2: #CCEAE6;
  --accent-deep:   #0a544f;

  /* Status colors — calm, not saturated */
  --st-green:     #15803d;        /* Order Placed */
  --st-green-bg:  #DCFCE7;
  --st-amber:     #B45309;        /* Not Yet Closed */
  --st-amber-bg:  #FEF3C7;
  --st-red:       #B91C1C;        /* Lost */
  --st-red-bg:    #FEE2E2;
  --st-gray:      #4B5563;
  --st-gray-bg:   #F3F4F6;

  /* Operational neutrals — slightly cooler than MA off-white
     so this reads as a tool, not a marketing page. */
  --app-bg:        #FAFAF7;
  --app-surface:   #FFFFFF;
  --app-surface-2: #F4F3EE;
  --app-line:      #E7E4DA;
  --app-line-strong: #D6D2C4;
  --app-ink-1:     #18181B;       /* primary text */
  --app-ink-2:     #3F3F46;       /* body */
  --app-ink-3:     #71717A;       /* secondary */
  --app-ink-4:     #A1A1AA;       /* placeholder / disabled */

  /* Density scale — flipped at runtime via [data-density="compact"] */
  --row-h:         48px;
  --kpi-pad:       24px;
  --section-gap:   24px;
}

[data-density="compact"] {
  --row-h:         36px;
  --kpi-pad:       16px;
  --section-gap:   16px;
}

/* Dark mode — inverted neutrals, accent tweaked for contrast */
[data-theme="dark"] {
  --app-bg:        #0B0B0E;
  --app-surface:   #15151A;
  --app-surface-2: #1C1C22;
  --app-line:      #26262E;
  --app-line-strong: #34343E;
  --app-ink-1:     #F4F4F5;
  --app-ink-2:     #D4D4D8;
  --app-ink-3:     #A1A1AA;
  --app-ink-4:     #71717A;

  --st-green-bg:   #052E16;
  --st-amber-bg:   #451A03;
  --st-red-bg:     #450A0A;
  --st-gray-bg:    #27272A;
}

/* ============================================================
   BASE
   ============================================================ */
html, body, #root { height: 100%; }
body {
  font-family: var(--font-ui);
  font-size: 14px;
  line-height: 1.5;
  color: var(--app-ink-2);
  background: var(--app-bg);
  font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
  -webkit-font-smoothing: antialiased;
}
* { box-sizing: border-box; }
button { font-family: inherit; }
input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }

/* ============================================================
   APP SHELL
   ============================================================ */
.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--app-bg);
}

.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 24px;
  background: var(--app-surface);
  border-bottom: 1px solid var(--app-line);
  position: sticky;
  top: 0;
  z-index: 30;
}
.topbar__brand {
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: 600;
  color: var(--app-ink-1);
  font-size: 14px;
  letter-spacing: -0.01em;
}
.topbar__brand-mark {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  background: var(--accent);
  color: var(--accent-ink);
  display: grid;
  place-items: center;
  font-family: 'Archivo Black', system-ui, sans-serif;
  font-size: 13px;
  letter-spacing: -0.02em;
  flex-shrink: 0;
  overflow: hidden;
}
.topbar__brand-mark img { width: 100%; height: 100%; object-fit: cover; }
.topbar__divider {
  width: 1px;
  height: 18px;
  background: var(--app-line);
  margin: 0 4px;
}
.topbar__crumb {
  font-size: 13px;
  color: var(--app-ink-3);
}
.topbar__crumb b { color: var(--app-ink-1); font-weight: 600; }

.topbar__nav {
  display: flex;
  gap: 2px;
  margin-left: 20px;
}
.topbar__nav a {
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 13px;
  color: var(--app-ink-3);
  text-decoration: none;
  cursor: pointer;
  font-weight: 500;
}
.topbar__nav a:hover { background: var(--app-surface-2); color: var(--app-ink-1); }
.topbar__nav a.is-active { background: var(--app-surface-2); color: var(--app-ink-1); }

.topbar__spacer { flex: 1; }
.topbar__user {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 4px 4px 10px;
  border-radius: 999px;
  border: 1px solid var(--app-line);
  font-size: 13px;
  color: var(--app-ink-2);
  cursor: pointer;
}
.topbar__user:hover { border-color: var(--app-line-strong); }
.avatar {
  width: 24px; height: 24px;
  border-radius: 999px;
  background: var(--accent);
  color: var(--accent-ink);
  display: grid;
  place-items: center;
  font-size: 11px;
  font-weight: 600;
}

/* Page container */
.page {
  flex: 1;
  padding: 24px;
  max-width: 1440px;
  width: 100%;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: var(--section-gap);
}

/* Sticky scoreboard area */
.scoreboard {
  position: sticky;
  top: 53px;
  z-index: 20;
  background: var(--app-bg);
  padding-top: 8px;
  margin-top: -8px;
  padding-bottom: 4px;
}

.page-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
}
.page-head__title {
  margin: 0;
  font-family: 'Archivo', system-ui, sans-serif;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.025em;
  color: var(--app-ink-1);
  line-height: 1.1;
}
.page-head__sub {
  font-size: 13px;
  color: var(--app-ink-3);
  margin-top: 4px;
}
.page-head__actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 32px;
  padding: 0 12px;
  border: 1px solid var(--app-line);
  border-radius: 6px;
  background: var(--app-surface);
  color: var(--app-ink-1);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 120ms;
  white-space: nowrap;
}
.btn:hover { border-color: var(--app-line-strong); background: var(--app-surface-2); }
.btn--primary {
  background: var(--accent);
  color: var(--accent-ink);
  border-color: var(--accent);
}
.btn--primary:hover { background: var(--accent-deep); border-color: var(--accent-deep); }
.btn--ghost { border-color: transparent; background: transparent; }
.btn--ghost:hover { background: var(--app-surface-2); }
.btn--icon {
  width: 32px;
  padding: 0;
  justify-content: center;
}
.btn--sm { height: 26px; padding: 0 8px; font-size: 12px; }

.icon { width: 16px; height: 16px; flex-shrink: 0; }
.icon-sm { width: 14px; height: 14px; }
.icon-lg { width: 18px; height: 18px; }

/* ============================================================
   KPI TILES
   ============================================================ */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.kpi {
  background: var(--app-surface);
  border: 1px solid var(--app-line);
  border-radius: 8px;
  padding: var(--kpi-pad);
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  transition: border-color 120ms;
}
.kpi:hover { border-color: var(--app-line-strong); }
.kpi__label {
  font-size: 12px;
  color: var(--app-ink-3);
  font-weight: 500;
  letter-spacing: 0.01em;
  display: flex;
  align-items: center;
  gap: 6px;
}
.kpi__label-info {
  width: 14px;
  height: 14px;
  color: var(--app-ink-4);
}
.kpi__value-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  flex-wrap: wrap;
}
.kpi__value {
  font-family: 'Archivo', system-ui, sans-serif;
  font-size: 32px;
  font-weight: 700;
  color: var(--app-ink-1);
  line-height: 1;
  letter-spacing: -0.025em;
  font-variant-numeric: tabular-nums;
}
.kpi__delta {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  font-size: 12px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.kpi__delta--up { color: var(--st-green); }
.kpi__delta--down { color: var(--st-red); }
.kpi__delta--flat { color: var(--app-ink-3); }
.kpi__foot {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 8px;
  margin-top: 2px;
}
.kpi__period {
  font-size: 11px;
  color: var(--app-ink-4);
  letter-spacing: 0.02em;
  text-transform: uppercase;
}
.kpi__spark {
  height: 28px;
  width: 96px;
  flex-shrink: 0;
}
.kpi--accent {
  background: linear-gradient(180deg, var(--accent-tint), var(--app-surface) 80%);
  border-color: var(--accent-tint-2);
}
[data-theme="dark"] .kpi--accent {
  background: var(--app-surface);
  border-color: var(--app-line);
  position: relative;
}
[data-theme="dark"] .kpi--accent::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(180deg, color-mix(in oklab, var(--accent) 15%, transparent), transparent 60%);
  pointer-events: none;
}

/* "Coming soon" placeholder variant */
.kpi--placeholder {
  border-style: dashed;
  background: transparent;
}
.kpi--placeholder .kpi__value {
  color: var(--app-ink-4);
  font-size: 18px;
  font-weight: 600;
  font-family: var(--font-ui);
  letter-spacing: -0.01em;
}
.kpi--placeholder .kpi__sub {
  font-size: 12px;
  color: var(--app-ink-4);
  margin-top: 6px;
}

/* ============================================================
   FILTER BAR
   ============================================================ */
.filterbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  background: var(--app-surface);
  border: 1px solid var(--app-line);
  border-radius: 8px;
  flex-wrap: wrap;
}
.filterbar__group {
  display: flex;
  align-items: center;
  gap: 6px;
}
.filterbar__sep {
  width: 1px;
  height: 18px;
  background: var(--app-line);
  margin: 0 4px;
}
.filterbar__search {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  min-width: 200px;
  height: 30px;
  padding: 0 10px;
  border: 1px solid var(--app-line);
  border-radius: 6px;
  background: var(--app-surface);
}
.filterbar__search:focus-within { border-color: var(--accent); }
.filterbar__search input {
  border: 0;
  outline: none;
  width: 100%;
  background: transparent;
  font-size: 13px;
}
.filterbar__search input::placeholder { color: var(--app-ink-4); }

/* Chip / pill */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 24px;
  padding: 0 10px;
  border-radius: 999px;
  background: var(--app-surface-2);
  color: var(--app-ink-2);
  font-size: 12px;
  font-weight: 500;
  border: 1px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  transition: all 120ms;
}
.chip:hover { background: var(--app-line); }
.chip.is-active {
  background: var(--accent);
  color: var(--accent-ink);
  border-color: var(--accent);
}
.chip__dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0.7;
}
.chip--campaign {
  background: transparent;
  border: 1px solid var(--app-line);
}
.chip--campaign .chip__dot { opacity: 1; }
.chip--campaign:hover { border-color: var(--app-line-strong); background: var(--app-surface-2); }
.chip--campaign.is-active {
  border-color: var(--accent);
  background: var(--accent-tint);
  color: var(--accent-deep);
}
[data-theme="dark"] .chip--campaign.is-active {
  background: color-mix(in oklab, var(--accent) 25%, transparent);
  color: var(--app-ink-1);
}

.seg {
  display: inline-flex;
  border: 1px solid var(--app-line);
  border-radius: 6px;
  padding: 2px;
  background: var(--app-surface);
  gap: 2px;
}
.seg button {
  height: 24px;
  padding: 0 10px;
  border: 0;
  background: transparent;
  color: var(--app-ink-3);
  font-size: 12px;
  font-weight: 500;
  border-radius: 4px;
  cursor: pointer;
}
.seg button:hover { color: var(--app-ink-1); }
.seg button.is-active {
  background: var(--app-surface-2);
  color: var(--app-ink-1);
}
[data-theme="dark"] .seg button.is-active { background: var(--app-line); }

/* ============================================================
   TABLE
   ============================================================ */
.table-wrap {
  background: var(--app-surface);
  border: 1px solid var(--app-line);
  border-radius: 8px;
  overflow: hidden;
}
.table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.table thead th {
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--app-ink-3);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 10px 12px;
  background: var(--app-surface-2);
  border-bottom: 1px solid var(--app-line);
  white-space: nowrap;
  position: sticky;
  top: 0;
}
.table tbody td {
  padding: 0 12px;
  height: var(--row-h);
  border-bottom: 1px solid var(--app-line);
  color: var(--app-ink-2);
  vertical-align: middle;
  white-space: nowrap;
}
.table tbody tr {
  cursor: pointer;
  transition: background 80ms;
}
.table tbody tr:hover { background: var(--app-surface-2); }
.table tbody tr.is-selected { background: var(--accent-tint); }
[data-theme="dark"] .table tbody tr.is-selected {
  background: color-mix(in oklab, var(--accent) 18%, transparent);
}
.table tbody tr:last-child td { border-bottom: 0; }

.cell-name { color: var(--app-ink-1); font-weight: 500; }
.cell-email { color: var(--app-ink-3); font-size: 12.5px; }
.cell-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; font-size: 12.5px; }
.cell-currency { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; }
.cell-disabled { color: var(--app-ink-4); }
.cell-icon-btn {
  width: 24px; height: 24px;
  border-radius: 4px;
  border: 0;
  background: transparent;
  color: var(--app-ink-3);
  cursor: pointer;
  display: inline-grid;
  place-items: center;
}
.cell-icon-btn:hover { background: var(--app-surface-2); color: var(--app-ink-1); }
.cell-icon-btn.has-notes { color: var(--accent); }

.cell-row-end {
  display: flex;
  gap: 4px;
  align-items: center;
  justify-content: flex-end;
}

/* Inline editable */
.inline-edit {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  margin: -4px -8px;
  border: 1px solid transparent;
  border-radius: 4px;
  cursor: text;
  min-height: 24px;
  font: inherit;
  color: inherit;
  background: transparent;
  width: 100%;
  text-align: left;
}
.inline-edit:hover:not(:disabled):not(.is-disabled) {
  border-color: var(--app-line);
  background: var(--app-surface);
}
.inline-edit:focus,
.inline-edit.is-editing {
  border-color: var(--accent);
  background: var(--app-surface);
  outline: none;
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 18%, transparent);
}
.inline-edit.is-disabled {
  cursor: not-allowed;
  color: var(--app-ink-4);
}
.inline-edit input {
  border: 0; outline: none; background: transparent; width: 100%;
  font: inherit; color: inherit;
  font-variant-numeric: inherit;
}

/* Status pill */
.status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 24px;
  padding: 0 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  background: var(--st-gray-bg);
  color: var(--st-gray);
}
.status::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
}
.status--green { background: var(--st-green-bg); color: var(--st-green); }
.status--amber { background: var(--st-amber-bg); color: var(--st-amber); }
.status--red   { background: var(--st-red-bg); color: var(--st-red); }
.status--inline { padding-right: 6px; }
.status .caret { width: 10px; height: 10px; opacity: 0.7; margin-left: 2px; }

/* Status dropdown */
.status-menu {
  position: absolute;
  z-index: 50;
  min-width: 180px;
  background: var(--app-surface);
  border: 1px solid var(--app-line);
  border-radius: 8px;
  padding: 4px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.04);
}
.status-menu button {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 6px 8px;
  border: 0;
  background: transparent;
  font-size: 13px;
  border-radius: 4px;
  cursor: pointer;
  text-align: left;
  color: var(--app-ink-1);
}
.status-menu button:hover { background: var(--app-surface-2); }
.status-menu button .check { margin-left: auto; opacity: 0; color: var(--accent); }
.status-menu button.is-current .check { opacity: 1; }

/* ============================================================
   EMPTY STATE
   ============================================================ */
.empty {
  padding: 56px 24px;
  text-align: center;
  color: var(--app-ink-3);
}
.empty__art {
  width: 96px;
  height: 96px;
  margin: 0 auto 20px;
  display: grid;
  place-items: center;
  border-radius: 16px;
  background: var(--app-surface-2);
  color: var(--accent);
  border: 1px dashed var(--app-line-strong);
}
.empty__title {
  font-family: 'Archivo', system-ui, sans-serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--app-ink-1);
  margin: 0 0 6px;
  letter-spacing: -0.01em;
}
.empty__copy { font-size: 13px; max-width: 360px; margin: 0 auto 20px; }

/* Skeleton */
.skel {
  display: inline-block;
  height: 12px;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--app-surface-2) 0%, var(--app-line) 50%, var(--app-surface-2) 100%);
  background-size: 200% 100%;
  animation: skelShimmer 1.4s linear infinite;
  vertical-align: middle;
}
@keyframes skelShimmer {
  from { background-position: 200% 0; }
  to   { background-position: -200% 0; }
}

/* ============================================================
   DRAWER
   ============================================================ */
.drawer-scrim {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.32);
  z-index: 60;
  opacity: 0;
  pointer-events: none;
  transition: opacity 200ms;
}
.drawer-scrim.is-open { opacity: 1; pointer-events: auto; }

.drawer {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 480px;
  max-width: 100vw;
  background: var(--app-surface);
  border-left: 1px solid var(--app-line);
  z-index: 61;
  transform: translateX(100%);
  transition: transform 280ms cubic-bezier(0.2, 0.8, 0.2, 1);
  display: flex;
  flex-direction: column;
  box-shadow: -16px 0 40px rgba(0, 0, 0, 0.08);
}
.drawer.is-open { transform: translateX(0); }
.drawer__head {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--app-line);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.drawer__head-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.drawer__name {
  font-family: 'Archivo', system-ui, sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--app-ink-1);
  letter-spacing: -0.02em;
  margin: 0;
}
.drawer__email {
  font-size: 13px;
  color: var(--app-ink-3);
}
.drawer__head-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  margin-top: 4px;
}
.drawer__body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px 32px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}
.drawer__section-h {
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--app-ink-3);
  font-weight: 600;
  margin: 0 0 12px;
}
.drawer__field-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.field {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.field--full { grid-column: span 2; }
.field label {
  font-size: 12px;
  color: var(--app-ink-3);
  font-weight: 500;
}
.field input, .field textarea, .field select {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--app-line);
  border-radius: 6px;
  background: var(--app-surface);
  font-size: 13px;
  color: var(--app-ink-1);
  outline: none;
  transition: border-color 120ms, box-shadow 120ms;
}
.field input:focus, .field textarea:focus, .field select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 18%, transparent);
}
.field textarea { resize: vertical; min-height: 72px; line-height: 1.45; }
.field input:disabled {
  background: var(--app-surface-2);
  color: var(--app-ink-4);
  cursor: not-allowed;
}

/* Timeline */
.timeline { position: relative; padding-left: 22px; }
.timeline::before {
  content: '';
  position: absolute;
  left: 7px; top: 6px; bottom: 6px;
  width: 1px;
  background: var(--app-line);
}
.tl-item {
  position: relative;
  padding-bottom: 14px;
  font-size: 13px;
}
.tl-item:last-child { padding-bottom: 0; }
.tl-item::before {
  content: '';
  position: absolute;
  left: -22px; top: 4px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--app-surface);
  border: 2px solid var(--app-line-strong);
}
.tl-item--accent::before { background: var(--accent); border-color: var(--accent); }
.tl-item--green::before { background: var(--st-green); border-color: var(--st-green); }
.tl-item--amber::before { background: var(--st-amber); border-color: var(--st-amber); }
.tl-item--red::before { background: var(--st-red); border-color: var(--st-red); }
.tl-title { color: var(--app-ink-1); font-weight: 500; }
.tl-meta { color: var(--app-ink-3); font-size: 12px; margin-top: 2px; }
.tl-detail { color: var(--app-ink-2); font-size: 12.5px; margin-top: 4px; }

/* Audit */
.audit {
  font-size: 12px;
  color: var(--app-ink-3);
  border-top: 1px solid var(--app-line);
  padding-top: 16px;
}
.audit-row {
  padding: 6px 0;
  display: flex;
  gap: 8px;
}
.audit-row b { color: var(--app-ink-1); font-weight: 500; }
.audit-row time { color: var(--app-ink-4); margin-left: auto; }

/* ============================================================
   SETTINGS PAGE
   ============================================================ */
.settings-grid {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 32px;
  align-items: start;
}
.settings-nav {
  position: sticky;
  top: 80px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.settings-nav a {
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 13px;
  color: var(--app-ink-3);
  text-decoration: none;
  cursor: pointer;
  font-weight: 500;
}
.settings-nav a:hover { background: var(--app-surface-2); color: var(--app-ink-1); }
.settings-nav a.is-active {
  background: var(--app-surface-2);
  color: var(--app-ink-1);
}
.settings-nav__head {
  padding: 8px 12px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--app-ink-4);
  margin-top: 8px;
}

.card {
  background: var(--app-surface);
  border: 1px solid var(--app-line);
  border-radius: 8px;
  padding: 24px;
  margin-bottom: 16px;
}
.card__head {
  margin-bottom: 16px;
}
.card__title {
  font-family: 'Archivo', system-ui, sans-serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--app-ink-1);
  margin: 0 0 4px;
  letter-spacing: -0.01em;
}
.card__sub {
  font-size: 13px;
  color: var(--app-ink-3);
  margin: 0;
}

/* Settings rows */
.set-row {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 24px;
  padding: 16px 0;
  border-top: 1px solid var(--app-line);
  align-items: center;
}
.set-row:first-of-type { border-top: 0; padding-top: 0; }
.set-row__label { font-size: 13px; color: var(--app-ink-2); font-weight: 500; }
.set-row__sub { font-size: 12px; color: var(--app-ink-3); margin-top: 2px; }
.set-row__ctrl { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

.color-swatch-row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.color-swatch {
  width: 28px; height: 28px;
  border-radius: 6px;
  border: 1px solid var(--app-line);
  cursor: pointer;
  position: relative;
}
.color-swatch.is-active {
  outline: 2px solid var(--app-ink-1);
  outline-offset: 2px;
}

.logo-upload {
  width: 64px; height: 64px;
  border: 1px dashed var(--app-line-strong);
  border-radius: 8px;
  display: grid;
  place-items: center;
  background: var(--app-surface-2);
  color: var(--app-ink-3);
  overflow: hidden;
}
.logo-upload img { width: 100%; height: 100%; object-fit: cover; }

/* Integration list */
.integ-list {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.integ {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px;
  border: 1px solid var(--app-line);
  border-radius: 6px;
}
.integ__icon {
  width: 36px; height: 36px;
  border-radius: 6px;
  background: var(--app-surface-2);
  display: grid;
  place-items: center;
  font-family: 'Archivo Black', sans-serif;
  font-size: 12px;
  color: var(--app-ink-1);
  flex-shrink: 0;
}
.integ__name { font-weight: 600; color: var(--app-ink-1); font-size: 13.5px; }
.integ__meta { font-size: 12px; color: var(--app-ink-3); margin-top: 2px; }
.integ__status {
  margin-left: auto;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 999px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.integ__status--ok { background: var(--st-green-bg); color: var(--st-green); }
.integ__status--soon { background: var(--st-gray-bg); color: var(--app-ink-3); }

/* User row */
.user-row {
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  gap: 12px;
  align-items: center;
  padding: 12px 0;
  border-top: 1px solid var(--app-line);
}
.user-row:first-of-type { border-top: 0; padding-top: 0; }
.user-row__main { display: flex; align-items: center; gap: 10px; }
.user-row__name { font-weight: 500; color: var(--app-ink-1); font-size: 13px; }
.user-row__email { font-size: 12px; color: var(--app-ink-3); }
.user-row__role {
  font-size: 12px;
  padding: 3px 8px;
  border-radius: 999px;
  background: var(--app-surface-2);
  color: var(--app-ink-2);
  font-weight: 500;
}
.user-row__role--admin { background: var(--accent-tint); color: var(--accent-deep); }
[data-theme="dark"] .user-row__role--admin {
  background: color-mix(in oklab, var(--accent) 22%, transparent);
  color: var(--app-ink-1);
}

/* ============================================================
   LOGIN
   ============================================================ */
.login {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  background: var(--app-bg);
}
.login__panel {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 64px;
  background: var(--app-surface);
  border-right: 1px solid var(--app-line);
}
.login__brand {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 56px;
}
.login__brand-mark {
  width: 40px; height: 40px;
  border-radius: 8px;
  background: var(--accent);
  color: var(--accent-ink);
  display: grid;
  place-items: center;
  font-family: 'Archivo Black', sans-serif;
  font-size: 16px;
  letter-spacing: -0.02em;
  overflow: hidden;
}
.login__brand-mark img { width: 100%; height: 100%; object-fit: cover; }
.login__brand-name {
  font-family: 'Archivo', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--app-ink-1);
  letter-spacing: -0.02em;
}
.login__title {
  font-family: 'Archivo', sans-serif;
  font-size: 32px;
  font-weight: 700;
  color: var(--app-ink-1);
  letter-spacing: -0.025em;
  line-height: 1.1;
  margin: 0 0 12px;
  max-width: 360px;
}
.login__sub {
  font-size: 14px;
  color: var(--app-ink-3);
  margin: 0 0 32px;
  max-width: 360px;
}
.login__form {
  display: flex;
  flex-direction: column;
  gap: 14px;
  max-width: 380px;
}
.login__divider {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--app-ink-4);
  font-size: 12px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin: 4px 0;
}
.login__divider::before, .login__divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--app-line);
}
.login__foot {
  margin-top: 32px;
  font-size: 12px;
  color: var(--app-ink-4);
  display: flex;
  align-items: center;
  gap: 8px;
}
.login__foot img { height: 14px; opacity: 0.6; }

.login__art {
  position: relative;
  background: var(--accent);
  color: var(--accent-ink);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 64px;
  overflow: hidden;
}
.login__art-quote {
  font-family: 'Archivo', sans-serif;
  font-size: 30px;
  line-height: 1.15;
  letter-spacing: -0.02em;
  font-weight: 600;
  max-width: 480px;
  margin: 0;
  position: relative;
  z-index: 2;
}
.login__art-attrib {
  font-size: 13px;
  opacity: 0.85;
  margin-top: 16px;
  position: relative;
  z-index: 2;
}
.login__art-deco {
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0.18;
}
.login__art-foot {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  font-size: 12px;
  opacity: 0.85;
  position: relative;
  z-index: 2;
}

/* ============================================================
   MOBILE / RESPONSIVE
   ============================================================ */
@media (max-width: 880px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .topbar__nav { display: none; }
  .login { grid-template-columns: 1fr; }
  .login__art { display: none; }
  .login__panel { padding: 32px 24px; border-right: 0; }
  .settings-grid { grid-template-columns: 1fr; }
  .settings-nav { position: static; flex-direction: row; overflow-x: auto; }
  .integ-list { grid-template-columns: 1fr; }
  .drawer { width: 100vw; }
}
@media (max-width: 640px) {
  .table { display: none; }
  .table-wrap.has-mobile-cards .mobile-cards { display: flex; }
  .page { padding: 16px; }
  .filterbar { flex-wrap: wrap; }
  .kpi-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .kpi__value { font-size: 26px; }
}

.mobile-cards {
  display: none;
  flex-direction: column;
  padding: 8px;
  gap: 8px;
}
.mobile-card {
  border: 1px solid var(--app-line);
  border-radius: 6px;
  padding: 12px;
  background: var(--app-surface);
}
.mobile-card__name { font-weight: 600; color: var(--app-ink-1); }
.mobile-card__row { display: flex; justify-content: space-between; font-size: 12px; color: var(--app-ink-3); margin-top: 4px; }
</style>
