name: Sheets → Supabase poll (every 5 min)

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:        # also runnable manually

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Hit n8n sheets-poll webhook
        run: |
          curl -fsS -X POST "https://n8n.aimanagingservices.com/webhook/lead-tracker-sheets-poll" \
            -H "Content-Type: application/json" \
            -d '{"source":"github-actions"}'
          echo ""
